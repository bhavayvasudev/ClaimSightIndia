services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: claimsight
      POSTGRES_PASSWORD: claimsight
      POSTGRES_DB: claimsight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://claimsight:claimsight@postgres:5432/claimsight
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app:/app/app
      - ../data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ../frontend
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
